<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo" class="logo">
        
        <!-- C'EST CETTE PARTIE QUI A CHANGÉ (LE FORMULAIRE) -->
        <form action="https://www.google.com/search" method="GET">
            
            <div class="search-container">
    <div class="search-bar">
        <input type="text" name="q" class="search-input" id="search-input" placeholder="Rechercher sur Google ou saisir une URL">
        
        <!-- Icône Recherche Vocale -->
        <div class="search-icons">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e8/Google_Mic_Logo.svg" alt="Micro" class="voice-icon" id="voice-btn">
            
            <!-- Icône Google Lens -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d7/Google_Lens_2023_Icon.svg" alt="Lens" class="lens-icon">
        </div>
    </div>
</div>

        </form>
        <!-- FIN DE LA PARTIE QUI A CHANGÉ -->

    </main>

    <script>
    const voiceBtn = document.getElementById('voice-btn');
    const searchInput = document.getElementById('search-input');

    // Vérifie si le navigateur supporte la reconnaissance vocale
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'fr-FR';

        // Quand on clique sur le micro
        voiceBtn.onclick = () => {
            recognition.start(); // Le navigateur demande l'accès au micro
            voiceBtn.style.opacity = "0.5"; // Petit effet visuel
        };

        // Quand la voix est transformée en texte
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            searchInput.value = transcript; // Met le texte dans la barre
            voiceBtn.style.opacity = "1";
            document.querySelector('form').submit(); // Lance la recherche automatiquement !
        };
    } else {
        alert("Désolé, votre navigateur ne supporte pas la recherche vocale.");
    }
</script>
</body>
</html>
