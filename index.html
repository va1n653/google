<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo" class="logo">
        
        <form action="https://www.google.com/search" method="GET">
            <div class="search-container">
                <input type="text" name="q" class="search-input" id="search-input" placeholder="Rechercher sur Google ou saisir une URL">
                
                <div class="search-icons">
                    <!-- Micro -->
                    <svg class="voice-icon" id="voice-btn" focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#4285f4" d="m12 15c1.66 0 3-1.31 3-2.97v-7.07c0-1.65-1.34-2.96-3-2.96s-3 1.31-3 2.96v7.07c0 1.66 1.34 2.97 3 2.97z"></path>
                        <path fill="#34a853" d="m11 18.08h2v3.92h-2z"></path>
                        <path fill="#fbbc05" d="m7.05 16.87c-1.27-1.33-2.05-3.12-2.05-5.09h2c0 1.38.56 2.63 1.47 3.54l-1.42 1.55z"></path>
                        <path fill="#ea4335" d="m12 18c-2.12 0-4.07-.86-5.5-2.26l1.45-1.52c1.05 1.01 2.48 1.63 4.05 1.63 3.31 0 6-2.69 6-6h2c0 4.41-3.59 8-8 8z"></path>
                    </svg>
                    
                    <!-- Vrai Google Lens -->
                    <svg class="lens-icon" focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#4285f4" d="M2.5,7L2,7L2,5C2,3.34,3.34,2,5,2L7,2L7,2.5L5,2.5C3.62,2.5,2.5,3.62,2.5,5L2.5,7z"></path>
                        <path fill="#ea4335" d="M17,2L19,2C20.66,2,22,3.34,22,5L22,7L21.5,7L21.5,5C21.5,3.62,20.38,2.5,19,2.5L17,2.5L17,2z"></path>
                        <path fill="#fbbc05" d="M22,17L22,19C22,20.66,20.66,22,19,22L17,22L17,21.5L19,21.5C20.38,21.5,21.5,20.38,21.5,19L21.5,17L22,17z"></path>
                        <path fill="#34a853" d="M7,22L5,22C3.34,22,2,20.66,2,19L2,17L2.5,17L2.5,19C2.5,20.38,3.62,21.5,5,21.5L7,21.5L7,22z"></path>
                        <path fill="#4285f4" d="M12,9C10.34,9,9,10.34,9,12s1.34,3,3,3s3-1.34,3-3S13.66,9,12,9z"></path>
                        <path fill="#ea4335" d="M17.5,12c0,0.28-0.22,0.5-0.5,0.5s-0.5-0.22-0.5-0.5s0.22-0.5,0.5-0.5S17.5,11.72,17.5,12z"></path>
                    </svg>
                </div>
            </div>

            <div class="buttons">
                <button type="submit">Recherche Google</button>
                <button type="button">J'ai de la chance</button>
            </div>
        </form>
    </main>

    <script>
        const voiceBtn = document.getElementById('voice-btn');
        const searchInput = document.getElementById('search-input');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition && voiceBtn) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            voiceBtn.onclick = () => {
                recognition.start();
                voiceBtn.style.opacity = "0.5";
            };
            recognition.onresult = (e) => {
                searchInput.value = e.results[0][0].transcript;
                voiceBtn.style.opacity = "1";
                document.querySelector('form').submit();
            };
        }
    </script>
</body>
</html>
