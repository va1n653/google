<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo" class="logo">
        
        <form action="https://www.google.com/search" method="GET">
            <div class="search-container">
                <input type="text" name="q" class="search-input" id="search-input" placeholder="Rechercher sur Google ou saisir une URL">
                
                <div class="search-icons">
                    <!-- Icône Micro (en SVG) -->
                    <svg class="voice-icon" id="voice-btn" focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285f4" d="m12 15c1.66 0 3-1.31 3-2.97v-7.07c0-1.65-1.34-2.96-3-2.96s-3 1.31-3 2.96v7.07c0 1.66 1.34 2.97 3 2.97z"></path><path fill="#34a853" d="m11 18.08h2v3.92h-2z"></path><path fill="#fbbc05" d="m7.05 16.87c-1.27-1.33-2.05-3.12-2.05-5.09h2c0 1.38.56 2.63 1.47 3.54l-1.42 1.55z"></path><path fill="#ea4335" d="m12 18c-2.12 0-4.07-.86-5.5-2.26l1.45-1.52c1.05 1.01 2.48 1.63 4.05 1.63 3.31 0 6-2.69 6-6h2c0 4.41-3.59 8-8 8z"></path></svg>
                    
                    <!-- Icône Lens (en SVG) -->
                    <svg class="lens-icon" focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7 2c-1.104 0-2 .896-2 2v2c0 1.104.896 2 2 2s2-.896 2-2v-2c0-1.104-.896-2-2-2zm10 0c-1.104 0-2 .896-2 2v2c0 1.104.896 2 2 2s2-.896 2-2v-2c0-1.104-.896-2-2-2zM7 16c-1.104 0-2 .896-2 2v2c0 1.104.896 2 2 2s2-.896 2-2v-2c0-1.104-.896-2-2-2zm10 0c-1.104 0-2 .896-2 2v2c0 1.104.896 2 2 2s2-.896 2-2v-2c0-1.104-.896-2-2-2z" fill="#4285f4"></path><path d="M12 9c-1.657 0-3 1.343-3 3s1.343 3 3 3 3-1.343 3-3-1.343-3-3-3z" fill="#ea4335"></path></svg>
                </div>
            </div>

            <div class="buttons">
                <button type="submit">Recherche Google</button>
                <button type="button">J'ai de la chance</button>
            </div>
        </form>
    </main>

    <!-- Script pour la voix (facultatif pour l'instant) -->
    <script>
        const voiceBtn = document.getElementById('voice-btn');
        const searchInput = document.getElementById('search-input');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition && voiceBtn) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            voiceBtn.onclick = () => recognition.start();
            recognition.onresult = (e) => {
                searchInput.value = e.results[0][0].transcript;
                document.querySelector('form').submit();
            };
        }
    </script>
</body>
</html>
